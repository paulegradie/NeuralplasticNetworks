name: Verify Documentation Paths

on:
  pull_request:
  push:

permissions:
  contents: write

jobs:
  verify-doc-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: fresh-foundation-repro-report-v2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify documentation source paths
        run: python scripts/verify_doc_source_paths.py
